<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Aura Indumentaria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      border-bottom: 1px solid #eee;
    }

    header h2 {
      margin: 0;
      letter-spacing: 2px;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    .hero {
      position: relative;
      height: 400px;
      overflow: hidden;
    }

    .hero video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero h1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 50px;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
    }

    .productos {
      padding: 40px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .precio {
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .social {
      text-align: center;
      margin: 30px 0;
    }

    .social a {
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
      color: black;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>AURA</h2>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Tienda</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<!-- VIDEO PRINCIPAL -->
<section class="hero">
  <video autoplay muted loop>
    <source src="video/modelo.mp4" type="video/mp4">
  </video>
  <h1>NUEVA COLECCIÓN</h1>
</section>

<!-- PRODUCTOS -->
<section class="productos">
  <h2>DESTACADOS</h2>

  <div class="grid">

    <div class="card">
      <img src="img/buzo1.jpg">
      <h3>Buzo Negro</h3>
      <p class="precio">$24.300</p>
      <a href="https://wa.me/5492622466018" class="btn">Comprar</a>
    </div>

    <div class="card">
      <img src="img/buzo2.jpg">
      <h3>Buzo Beige</h3>
      <p class="precio">$24.300</p>
      <a href="https://wa.me/5492622466018" class="btn">Comprar</a>
    </div>

  </div>
</section>

<!-- REDES -->
<section class="social">
  <a href="https://www.instagram.com/auraindumentariaog?igsh=MXh6NmY5bXltcDNxaQ==">Instagram</a>
  <a href="https://www.facebook.com/profile.php?id=61577531774795">Facebook</a>
</section>

<footer>
  <p>© 2026 Aura Indumentaria</p>
</footer>

<!-- BOTON WHATSAPP -->
<a href="https://wa.me/5492622466018" class="whatsapp">💬</a>

</body>
</html>
